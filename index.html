<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef GG Pro - Gestão Elite v6.3</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --success: #16a34a; --danger: #ef4444; --warning: #f59e0b;
            --dark: #1e293b; --light: #f8fafc; --border: #e2e8f0; --surface: #ffffff;
            --text-main: #334155; --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--text-main); line-height: 1.6; }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--surface); box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; padding-bottom: 80px; }
        .header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .content { padding: 15px; }
        .hidden { display: none !important; }

        .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; font-size: 14px; outline: none; background: white; font-family: inherit; }
        
        button { cursor: pointer; border: none; font-family: 'Inter', sans-serif; font-weight: 600; transition: 0.2s; }
        .btn-primary { width: 100%; background: var(--primary); color: white; padding: 15px; border-radius: 8px; font-size: 16px; margin-top: 10px; }
        .btn-outline { background: none; border: 1px solid var(--border); padding: 8px 15px; border-radius: 6px; font-size: 13px; color: var(--text-main); }
        .btn-small { padding: 12px; height: 46px; background: var(--dark); color: white; border-radius: 8px; width: 46px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .nav-item { text-align: center; background: none; color: var(--text-muted); font-size: 10px; flex: 1; border: none; }
        .nav-item.active { color: var(--primary); }

        .cmv-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .cmv-box { background: #f1f5f9; padding: 10px; border-radius: 8px; text-align: center; font-size: 11px; border: 1px solid var(--border); }

        .hist-item { font-size: 10px; padding: 5px; border-bottom: 1px solid #eee; color: var(--text-muted); }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .list-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; margin-right: 12px; border: 1px solid var(--border); }
        .img-preview { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background: #eee; margin-bottom: 15px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="loading-overlay"><strong>Sincronizando...</strong><p>Aguarde um momento</p></div>

    <div class="app-container">
        <div class="header"><h2>Chef GG Pro Cloud</h2></div>

        <div class="content">
            <div id="screen-home" class="screen">
                <div class="card"><h3>Dashboard</h3><p>Controle de Insumos e Produção.</p></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="card" style="text-align: center;"><small>Insumos</small><h2 id="count-insumos">0</h2></div>
                    <div class="card" style="text-align: center;"><small>Receitas</small><h2 id="count-lanches">0</h2></div>
                </div>
            </div>

            <div id="screen-lanches" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h3>Fichas Técnicas</h3>
                    <button class="btn-outline" onclick="abrirNovaFicha()">+ Criar</button>
                </div>
                <div id="list-lanches"></div>
            </div>

            <div id="screen-ficha" class="screen hidden">
                <h3>Ficha Técnica</h3>
                <div class="card"><label>Imagem</label><img id="ft-img-preview" class="img-preview"><input type="file" accept="image/*" onchange="previewImage(this)"></div>
                
                <div class="card">
                    <label>Nome da Receita</label><input type="text" id="ft-nome">
                    <label>Categoria da Receita</label>
                    <div style="display: flex; gap: 5px;">
                        <select id="ft-tipo"></select>
                        <button onclick="navegar('screen-categorias')" class="btn-small" style="background:var(--primary)">+</button>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <div style="flex:1"><label>Situação</label><select id="ft-status"><option value="ativo">Ativo</option><option value="teste">Teste</option></select></div>
                        <div style="flex:1"><label>Preço Venda</label><input type="number" id="ft-venda-manual" step="0.01" oninput="calcularCalculosCMV()"></div>
                    </div>
                </div>

                <div class="card">
                    <label>Ingredientes / Sub-receitas</label>
                    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                        <select id="ft-select-insumo" style="flex:3; margin-bottom:0; font-size: 11px;"></select>
                        <input type="number" id="ft-qtd" placeholder="Qtd" style="flex:1; margin-bottom:0;">
                        <button onclick="addIngredienteFicha()" class="btn-small" style="background:var(--success)">+</button>
                    </div>
                    <div id="ft-lista-itens"></div>
                </div>

                <div class="cmv-grid">
                    <div class="cmv-box"><small>35%</small><br><b id="res-35">R$ 0,00</b></div>
                    <div class="cmv-box"><small>30%</small><br><b id="res-30">R$ 0,00</b></div>
                    <div class="cmv-box" id="res-cmv-real-box"><small>CMV Real</small><br><b id="res-cmv-real">0%</b></div>
                </div>

                <button class="btn-primary" onclick="salvarLanche()">💾 SALVAR FICHA</button>
                <button class="btn-outline" style="width:100%; margin-top:10px" onclick="navegar('screen-lanches')">Descartar</button>
            </div>

            <div id="screen-insumos" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px"><h3>Estoque</h3><button class="btn-outline" onclick="abrirFormInsumo()">+ Novo</button></div>
                <div id="list-insumos"></div>
            </div>

            <div id="screen-form-insumo" class="screen hidden">
                <h3 id="in-titulo-form">Novo Insumo</h3>
                <div class="card">
                    <label>Nome do Insumo</label><input type="text" id="in-nome">
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div><label>Preço</label><input type="number" id="in-preco" step="0.01"></div>
                        <div><label>Unidade</label><select id="in-un"><option>kg</option><option>un</option><option>lt</option></select></div>
                    </div>

                    <label>Classificação (ex: Proteínas)</label>
                    <div style="display: flex; gap: 5px; margin-bottom: 12px;">
                        <select id="in-classificacao" style="margin-bottom:0;"></select>
                        <button onclick="navegar('screen-classificacoes')" class="btn-small" style="background:var(--primary)">+</button>
                    </div>

                    <label>Marca</label>
                    <div style="display: flex; gap: 5px; margin-bottom: 12px;">
                        <select id="in-marca" style="margin-bottom:0;"></select>
                        <button onclick="navegar('screen-marcas')" class="btn-small" style="background:var(--primary)">+</button>
                    </div>

                    <label>Fornecedor</label>
                    <div style="display: flex; gap: 5px;">
                        <select id="in-fornecedor" style="margin-bottom:0;"></select>
                        <button onclick="navegar('screen-fornecedores')" class="btn-small" style="background:var(--primary)">+</button>
                    </div>
                </div>
                <button class="btn-primary" onclick="salvarInsumo()">SALVAR INSUMO</button>
                <button class="btn-outline" style="width:100%; margin-top:10px" onclick="navegar('screen-insumos')">Cancelar</button>
            </div>

            <div id="screen-classificacoes" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px"><h3>Classificações</h3><button class="btn-outline" onclick="navegar('screen-form-insumo')">Voltar</button></div>
                <div class="card"><label>Nova Classificação</label><div style="display: flex; gap: 5px;"><input type="text" id="class-novo-nome" style="margin-bottom:0;"><button onclick="salvarClassificacao()" class="btn-small" style="background:var(--success)">+</button></div></div>
                <div id="list-classificacoes"></div>
            </div>

            <div id="screen-marcas" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px"><h3>Marcas</h3><button class="btn-outline" onclick="navegar('screen-form-insumo')">Voltar</button></div>
                <div class="card"><label>Nova Marca</label><div style="display: flex; gap: 5px;"><input type="text" id="marca-novo-nome" style="margin-bottom:0;"><button onclick="salvarMarca()" class="btn-small" style="background:var(--success)">+</button></div></div>
                <div id="list-marcas"></div>
            </div>

            <div id="screen-fornecedores" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px"><h3>Fornecedores</h3><button class="btn-outline" onclick="navegar('screen-form-insumo')">Voltar</button></div>
                <div class="card"><label>Novo Fornecedor</label><div style="display: flex; gap: 5px;"><input type="text" id="forn-novo-nome" style="margin-bottom:0;"><button onclick="salvarFornecedor()" class="btn-small" style="background:var(--success)">+</button></div></div>
                <div id="list-fornecedores"></div>
            </div>

            <div id="screen-categorias" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px"><h3>Categorias</h3><button class="btn-outline" onclick="navegar('screen-ficha')">Voltar</button></div>
                <div class="card"><label>Nova Categoria</label><div style="display: flex; gap: 5px;"><input type="text" id="cat-novo-nome" style="margin-bottom:0;"><button onclick="salvarCategoria()" class="btn-small" style="background:var(--success)">+</button></div></div>
                <div id="list-categorias"></div>
            </div>

        </div>

        <div class="nav-bar">
            <button class="nav-item active" id="nav-home" onclick="navegar('screen-home')">🏠<br>Home</button>
            <button class="nav-item" id="nav-insumos" onclick="navegar('screen-insumos')">📦<br>Insumos</button>
            <button class="nav-item" id="nav-lanches" onclick="navegar('screen-lanches')">🍔<br>Fichas</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB1YIZSBbNWzbOLH6vLjkZN9C-vib2wXPk",
            authDomain: "chef-gg-pro.firebaseapp.com",
            projectId: "chef-gg-pro",
            storageBucket: "chef-gg-pro.firebasestorage.app",
            messagingSenderId: "183718681004",
            appId: "1:183718681004:web:bdd4749c8b4c904cd6c209"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let insumos = [], lanches = [], categorias = [], fornecedores = [], marcas = [], classificacoes = [];
        let editingId = null, editingInsumoId = null, ingredientesTemporarios = [], base64Image = "";

        async function carregarDados() {
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const [insS, lanS, catS, forS, marS, claS] = await Promise.all([
                    db.collection('insumos').get(), db.collection('receitas').get(),
                    db.collection('categorias').get(), db.collection('fornecedores').get(),
                    db.collection('marcas').get(), db.collection('classificacoes').get()
                ]);
                insumos = insS.docs.map(d => ({ id: d.id, ...d.data() }));
                lanches = lanS.docs.map(d => ({ id: d.id, ...d.data() }));
                categorias = catS.docs.map(d => ({ id: d.id, ...d.data() }));
                fornecedores = forS.docs.map(d => ({ id: d.id, ...d.data() }));
                marcas = marS.docs.map(d => ({ id: d.id, ...d.data() }));
                classificacoes = claS.docs.map(d => ({ id: d.id, ...d.data() }));
                
                renderTudo();
                document.getElementById('count-insumos').innerText = insumos.length;
                document.getElementById('count-lanches').innerText = lanches.length;
            } catch (e) { console.error(e); }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function renderTudo() {
            renderInsumos(); renderLanches(); 
            renderGenericList('list-classificacoes', classificacoes, 'classificacoes');
            renderGenericList('list-marcas', marcas, 'marcas');
            renderGenericList('list-fornecedores', fornecedores, 'fornecedores');
            renderGenericList('list-categorias', categorias, 'categorias');
            
            popularSelect('in-classificacao', classificacoes);
            popularSelect('in-marca', marcas);
            popularSelect('in-fornecedor', fornecedores);
            popularSelect('ft-tipo', categorias);
            popularSeletorCombo();
        }

        function popularSelect(id, lista) {
            document.getElementById(id).innerHTML = lista.map(item => `<option value="${item.nome}">${item.nome}</option>`).join('');
        }

        function popularSeletorCombo() {
            let h = '<option value="">Selecione...</option><optgroup label="📦 INSUMOS">';
            insumos.forEach(i => h += `<option value="INS_${i.id}">${i.nome} (${i.marca}) - R$ ${i.valor.toFixed(2)}</option>`);
            h += '</optgroup><optgroup label="👨‍🍳 SUB-RECEITAS">';
            lanches.forEach(l => h += `<option value="REC_${l.id}">[PRODUÇÃO] ${l.nome} - R$ ${l.custo.toFixed(2)}</option>`);
            document.getElementById('ft-select-insumo').innerHTML = h + '</optgroup>';
        }

        async function salvarInsumo() {
            const iObj = {
                nome: document.getElementById('in-nome').value,
                valor: parseFloat(document.getElementById('in-preco').value),
                unidade: document.getElementById('in-un').value,
                classificacao: document.getElementById('in-classificacao').value,
                marca: document.getElementById('in-marca').value,
                fornecedor: document.getElementById('in-fornecedor').value
            };
            if(!iObj.nome || isNaN(iObj.valor)) return alert("Preencha os campos!");
            if(editingInsumoId) await db.collection('insumos').doc(editingInsumoId).update(iObj);
            else await db.collection('insumos').add(iObj);
            carregarDados(); navegar('screen-insumos');
        }

        async function salvarClassificacao() {
            const n = document.getElementById('class-novo-nome').value;
            if(n) { await db.collection('classificacoes').add({nome: n}); document.getElementById('class-novo-nome').value=''; carregarDados(); }
        }

        // Funções Genéricas e de Apoio
        function renderGenericList(divId, data, col) {
            document.getElementById(divId).innerHTML = data.map(i => `<div class="card" style="padding:10px; display:flex; justify-content:space-between">${i.nome}<button onclick="excluirItem('${col}','${i.id}')" style="color:red; background:none;">✕</button></div>`).join('');
        }
        async function excluirItem(col, id) { if(confirm("Excluir?")) { await db.collection(col).doc(id).delete(); carregarDados(); } }
        async function salvarMarca() { const n = document.getElementById('marca-novo-nome').value; if(n) { await db.collection('marcas').add({nome:n}); document.getElementById('marca-novo-nome').value=''; carregarDados(); } }
        async function salvarFornecedor() { const n = document.getElementById('forn-novo-nome').value; if(n) { await db.collection('fornecedores').add({nome:n}); document.getElementById('forn-novo-nome').value=''; carregarDados(); } }
        async function salvarCategoria() { const n = document.getElementById('cat-novo-nome').value; if(n) { await db.collection('categorias').add({nome:n}); document.getElementById('cat-novo-nome').value=''; carregarDados(); } }

        function renderInsumos() {
            document.getElementById('list-insumos').innerHTML = insumos.map(i => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${i.nome}</b><br><small>${i.classificacao || 'S/C'} | ${i.marca || 'S/M'}<br>R$ ${i.valor.toFixed(2)}/${i.unidade}</small></div>
                    <button onclick="abrirEditarInsumo('${i.id}')">📝</button>
                </div>
            `).join('');
        }

        function abrirEditarInsumo(id) {
            editingInsumoId = id; const i = insumos.find(x => x.id == id);
            document.getElementById('in-titulo-form').innerText = "Editar Insumo";
            document.getElementById('in-nome').value = i.nome; document.getElementById('in-preco').value = i.valor;
            document.getElementById('in-un').value = i.unidade; document.getElementById('in-classificacao').value = i.classificacao || '';
            document.getElementById('in-marca').value = i.marca || ''; document.getElementById('in-fornecedor').value = i.fornecedor || '';
            navegar('screen-form-insumo');
        }

        function abrirFormInsumo() { editingInsumoId = null; document.getElementById('in-titulo-form').innerText = "Novo Insumo"; document.getElementById('in-nome').value = ''; document.getElementById('in-preco').value = ''; navegar('screen-form-insumo'); }

        // Mantendo Navegação e Ficha Técnica
        function navegar(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function previewImage(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { base64Image = e.target.result; document.getElementById('ft-img-preview').src = base64Image; }; r.readAsDataURL(i.files[0]); } }
        function abrirNovaFicha() { editingId = null; ingredientesTemporarios = []; document.getElementById('ft-nome').value = ''; document.getElementById('ft-img-preview').src = ''; renderItensFicha(); navegar('screen-ficha'); }
        
        function addIngredienteFicha() {
            const val = document.getElementById('ft-select-insumo').value, qtd = parseFloat(document.getElementById('ft-qtd').value);
            if(!val || !qtd) return;
            const [tipo, id] = val.split('_');
            const item = tipo === 'INS' ? insumos.find(x => x.id === id) : lanches.find(x => x.id === id);
            ingredientesTemporarios.push({ 
                nome: tipo === 'INS' ? `${item.nome} (${item.marca})` : `[REC] ${item.nome}`, 
                qtd, un: tipo === 'INS' ? item.unidade : 'un', custo: (tipo === 'INS' ? item.valor : item.custo) * qtd 
            });
            renderItensFicha(); calcularCalculosCMV();
        }

        function renderItensFicha() {
            document.getElementById('ft-lista-itens').innerHTML = ingredientesTemporarios.map((i, idx) => `<div style="font-size:12px; border-bottom:1px solid #eee; padding:5px; display:flex; justify-content:space-between">${i.qtd}${i.un} ${i.nome} - R$ ${i.custo.toFixed(2)}<button onclick="ingredientesTemporarios.splice(${idx},1);renderItensFicha();calcularCalculosCMV()">✕</button></div>`).join('');
        }

        function calcularCalculosCMV() {
            const v = parseFloat(document.getElementById('ft-venda-manual').value) || 0, c = ingredientesTemporarios.reduce((acc, curr) => acc + curr.custo, 0);
            document.getElementById('res-35').innerText = `R$ ${(c / 0.35).toFixed(2)}`;
            document.getElementById('res-30').innerText = `R$ ${(c / 0.30).toFixed(2)}`;
            if(v > 0) document.getElementById('res-cmv-real').innerText = `${((c / v) * 100).toFixed(1)}%`;
        }

        async function salvarLanche() {
            const lObj = {
                nome: document.getElementById('ft-nome').value, tipo: document.getElementById('ft-tipo').value,
                venda: parseFloat(document.getElementById('ft-venda-manual').value) || 0,
                custo: ingredientesTemporarios.reduce((acc, curr) => acc + curr.custo, 0),
                ingredientes: ingredientesTemporarios, imagem: base64Image
            };
            if(editingId) await db.collection('receitas').doc(editingId).update(lObj);
            else await db.collection('receitas').add(lObj);
            carregarDados(); navegar('screen-lanches');
        }

        function renderLanches() {
            document.getElementById('list-lanches').innerHTML = lanches.map(l => `
                <div class="card" style="display:flex; align-items:center;">
                    <img src="${l.imagem || ''}" class="list-img">
                    <div style="flex:1"><strong>${l.nome}</strong><br><small>Custo: R$ ${l.custo.toFixed(2)}</small></div>
                    <button onclick="editarLanche('${l.id}')">📝</button>
                </div>
            `).join('');
        }

        function editarLanche(id) {
            editingId = id; const l = lanches.find(x => x.id == id);
            document.getElementById('ft-nome').value = l.nome; document.getElementById('ft-venda-manual').value = l.venda;
            base64Image = l.imagem; document.getElementById('ft-img-preview').src = l.imagem || '';
            ingredientesTemporarios = l.ingredientes || [];
            renderItensFicha(); calcularCalculosCMV(); navegar('screen-ficha');
        }

        carregarDados();
    </script>
</body>
</html>
