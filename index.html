<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef GG Cloud - v7 Final</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #ef4444; --dark: #1e293b; --light: #f8fafc; --border: #e2e8f0; --surface: #ffffff; --text-main: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--text-main); }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--surface); position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .content { padding: 15px; }
        .hidden { display: none !important; }
        .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; font-size: 14px; outline: none; }
        button { cursor: pointer; border: none; font-weight: 600; transition: 0.2s; border-radius: 8px; }
        .btn-primary { width: 100%; background: var(--primary); color: white; padding: 15px; font-size: 16px; }
        .btn-outline { background: none; border: 1px solid var(--border); padding: 8px 15px; font-size: 13px; }
        .btn-small { padding: 10px; background: var(--dark); color: white; }
        .img-preview { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background: #eee; margin-bottom: 15px; }
        .list-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; margin-right: 12px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; border-top: 1px solid var(--border); display: flex; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; background: none; color: #64748b; font-size: 10px; }
        .nav-item.active { color: var(--primary); }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading-overlay"><span>Sincronizando com a Nuvem...</span></div>

    <div class="app-container">
        <div class="header"><h2>Chef GG Cloud</h2></div>

        <div class="content">
            <div id="screen-home" class="screen">
                <div class="card"><h3>Dashboard Global</h3><p>Dados salvos na conta <b>chef-gg-pro</b></p></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="card" style="text-align: center;"><small>Insumos</small><h2 id="count-insumos">0</h2></div>
                    <div class="card" style="text-align: center;"><small>Receitas</small><h2 id="count-lanches">0</h2></div>
                </div>
            </div>

            <div id="screen-lanches" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h3>Minhas Receitas</h3>
                    <button class="btn-outline" onclick="abrirNovaFicha()">+ Criar</button>
                </div>
                <div id="list-lanches"></div>
            </div>

            <div id="screen-ficha" class="screen hidden">
                <h3>Ficha Técnica</h3>
                <div class="card"><label>Nome</label><input type="text" id="ft-nome"><label>Venda (R$)</label><input type="number" id="ft-venda-manual" step="0.01"></div>
                <div class="card">
                    <label>Adicionar Ingrediente</label>
                    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                        <select id="ft-select-insumo" style="flex:3; margin-bottom:0;"></select>
                        <input type="number" id="ft-qtd" placeholder="Qtd" style="flex:1; margin-bottom:0;">
                        <button onclick="addIngredienteFicha()" class="btn-small" style="background:var(--success)">+</button>
                    </div>
                    <div id="ft-lista-itens"></div>
                </div>
                <button class="btn-primary" onclick="salvarLanche()">💾 SALVAR AGORA</button>
                <button class="btn-outline" style="width:100%; margin-top:10px" onclick="navegar('screen-lanches')">Voltar</button>
            </div>

            <div id="screen-insumos" class="screen hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px"><h3>Insumos</h3><button class="btn-outline" onclick="abrirFormInsumo()">+ Novo</button></div>
                <div id="list-insumos"></div>
            </div>

            <div id="screen-form-insumo" class="screen hidden">
                <h3>Novo Insumo</h3>
                <div class="card"><label>Nome</label><input type="text" id="in-nome"><label>Preço</label><input type="number" id="in-preco" step="0.01"><label>Unidade</label><select id="in-un"><option>kg</option><option>un</option><option>lt</option></select></div>
                <button class="btn-primary" onclick="salvarInsumo()">Salvar no Banco</button>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-item active" onclick="navegar('screen-home')">🏠<br>Home</button>
            <button class="nav-item" onclick="navegar('screen-insumos')">📦<br>Insumos</button>
            <button class="nav-item" onclick="navegar('screen-lanches')">🍔<br>Fichas</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO FIREBASE (Sincronizado com seus prints)
        const firebaseConfig = {
            apiKey: "AIzaSyB1YIZSBbNWzbOLH6vLjkZN9C-vib2wXPk",
            authDomain: "chef-gg-pro.firebaseapp.com",
            projectId: "chef-gg-pro",
            storageBucket: "chef-gg-pro.firebasestorage.app",
            messagingSenderId: "183718681004",
            appId: "1:183718681004:web:bdd4749c8b4c904cd6c209",
            measurementId: "G-2BGV2M57TP"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let insumos = [];
        let lanches = [];
        let ingredientesTemporarios = [];

        async function carregarDados() {
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const insSnap = await db.collection('insumos').get();
                insumos = insSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                const lanSnap = await db.collection('receitas').get();
                lanches = lanSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                atualizarDashboard(); renderInsumos(); renderLanches(); popularSeletorInsumos();
            } catch (e) { console.error(e); }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        async function salvarLanche() {
            const nome = document.getElementById('ft-nome').value;
            if(!nome) return alert("Dê um nome!");
            try {
                await db.collection('receitas').add({
                    nome,
                    venda: parseFloat(document.getElementById('ft-venda-manual').value) || 0,
                    ingredientes: ingredientesTemporarios,
                    dataUpdate: new Date().getTime()
                });
                alert("Salvo na Nuvem!"); carregarDados(); navegar('screen-lanches');
            } catch(e) { alert("Erro ao salvar: Verifique se ativou as REGRAS no Firebase."); }
        }

        async function salvarInsumo() {
            const nome = document.getElementById('in-nome').value;
            const valor = parseFloat(document.getElementById('in-preco').value);
            if(!nome || !valor) return alert("Preencha tudo!");
            try {
                await db.collection('insumos').add({ nome, valor, unidade: document.getElementById('in-un').value });
                carregarDados(); navegar('screen-insumos');
            } catch(e) { alert("Erro ao salvar insumo."); }
        }

        function navegar(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function renderLanches() {
            document.getElementById('list-lanches').innerHTML = lanches.map(l => `
                <div class="card"><strong>${l.nome}</strong> - R$ ${l.venda.toFixed(2)}</div>
            `).join('');
        }

        function renderInsumos() {
            document.getElementById('list-insumos').innerHTML = insumos.map(i => `
                <div class="card"><b>${i.nome}</b> - R$ ${i.valor.toFixed(2)}/${i.unidade}</div>
            `).join('');
        }

        function popularSeletorInsumos() {
            document.getElementById('ft-select-insumo').innerHTML = insumos.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');
        }

        function addIngredienteFicha() {
            const id = document.getElementById('ft-select-insumo').value;
            const ins = insumos.find(x => x.id == id);
            const qtd = parseFloat(document.getElementById('ft-qtd').value);
            if(ins && qtd) {
                ingredientesTemporarios.push({ nome: ins.nome, qtd, custo: ins.valor * qtd });
                document.getElementById('ft-lista-itens').innerHTML = ingredientesTemporarios.map(i => `<div>${i.qtd}x ${i.nome}</div>`).join('');
            }
        }

        function atualizarDashboard() {
            document.getElementById('count-insumos').innerText = insumos.length;
            document.getElementById('count-lanches').innerText = lanches.length;
        }

        function abrirNovaFicha() {
            ingredientesTemporarios = [];
            document.getElementById('ft-nome').value = "";
            document.getElementById('ft-lista-itens').innerHTML = "";
            navegar('screen-ficha');
        }

        function abrirFormInsumo() {
            document.getElementById('in-nome').value = "";
            document.getElementById('in-preco').value = "";
            navegar('screen-form-insumo');
        }

        carregarDados();
    </script>
</body>
</html>
